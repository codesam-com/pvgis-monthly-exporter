name: Generate PVGIS monthly datasets

on:
  workflow_dispatch:
    inputs:
      latitude:
        description: "Latitude in decimal degrees (south negative)"
        required: true
        type: string
      longitude:
        description: "Longitude in decimal degrees (west negative)"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: pvgis-monthly-${{ inputs.latitude }}-${{ inputs.longitude }}
  cancel-in-progress: false

jobs:
  generate_monthly_exports:
    name: Generate monthly exports
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate PVGIS monthly datasets
        run: |
          python scripts/generate_pvgis_monthly.py \
            --latitude "${{ inputs.latitude }}" \
            --longitude "${{ inputs.longitude }}"

      - name: Commit generated files
        run: |
          if [ -z "$(git status --porcelain data)" ]; then
            echo "No changes detected in data/"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add data/
          git commit -m "data: update PVGIS monthly exports for lat=${{ inputs.latitude }}, lon=${{ inputs.longitude }}"
          git push

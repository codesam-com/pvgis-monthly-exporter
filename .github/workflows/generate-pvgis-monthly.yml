name: Generate PVGIS monthly datasets

on:
  workflow_dispatch:
    inputs:
      latitude:
        description: "Latitude in decimal degrees (south negative)"
        required: true
        type: string
      longitude:
        description: "Longitude in decimal degrees (west negative)"
        required: true
        type: string

concurrency:
  group: pvgis-monthly-${{ inputs.latitude }}-${{ inputs.longitude }}
  cancel-in-progress: false

jobs:
  generate_monthly_exports:
    name: Generate monthly exports
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate PVGIS monthly datasets
        run: |
          python scripts/generate_pvgis_monthly.py \
            --latitude "${{ inputs.latitude }}" \
            --longitude "${{ inputs.longitude }}"

      - name: Upload PVGIS outputs as artifact
        uses: actions/upload-artifact@v4
        with:
          name: pvgis-monthly-${{ inputs.latitude }}-${{ inputs.longitude }}
          path: |
            data/**/*.csv
            data/**/*.json
            data/**/*.xlsx
          if-no-files-found: error
          retention-days: 7
